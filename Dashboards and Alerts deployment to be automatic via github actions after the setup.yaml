##CloudWatch dashboards (via CFN)
##Grafana dashboards + alerts + templates (via API)

# 1.Code pushed to GitHub
# 2.GitHub Actions pipeline runs
# 3.Deploys:
   #Amazon CloudWatch dashboards via CFN
   #Amazon Managed Grafana dashboards + alerts via API
Alerts notify via Amazon SNS
